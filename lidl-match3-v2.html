<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450, initial-scale=1.0">
<title>Lidl Match-3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;}
#game-wrap{
  width:450px;height:800px;
  position:relative;overflow:hidden;
  font-family:Arial,sans-serif;
}
#bg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;z-index:0;
}

/* A — Logo zone: 40px from top, 100px tall */
#logo-zone{
  position:absolute;
  top:40px;
  left:0;width:100%;height:100px;
  display:flex;align-items:center;justify-content:center;
  z-index:2;
}
#logo-zone img{
  max-width:300px;max-height:100px;
  object-fit:contain;
}

/* B — HUD bar: 30px below logo bottom = top 170px */
#hud{
  position:absolute;
  top:170px;
  left:0;width:100%;height:56px;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:2;
}
.hud-box{
  background:#e60a14;
  border-radius:8px;
  padding:6px 28px;
  text-align:center;
  min-width:130px;
}
.hud-label{
  color:white;font-size:11px;
  font-weight:700;letter-spacing:1px;opacity:0.85;
}
.hud-value{
  color:white;font-size:22px;
  font-weight:700;line-height:1.1;
}

/* C — Grid zone: 30px below HUD bottom = top 256px */
#grid-zone{
  position:absolute;
  top:237px;
  left:0;width:100%;
  display:flex;justify-content:center;align-items:flex-start;
  z-index:2;
}
#grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  padding:8px;
  background:rgba(0,0,0,0.18);
  border-radius:12px;
  width:420px;
}
.cell{
  width:76px;height:76px;
  border-radius:10px;
  background:rgba(255,255,255,0.12);
  border:2px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform 0.1s,border-color 0.15s;
  position:relative;overflow:hidden;
}
.cell:hover{border-color:rgba(255,255,255,0.5);}
.cell.selected{
  border-color:#FFD700;border-width:3px;
  transform:scale(1.08);
  background:rgba(255,215,0,0.15);
}
.cell.matched{animation:pop 0.35s ease forwards;}
.cell img{
  width:64px;height:64px;
  object-fit:contain;
  pointer-events:none;user-select:none;
}

/* D — Text box: pinned to bottom */
#text-box{
  position:absolute;
  bottom:84px;
  left:0;width:100%;
  z-index:2;
  display:flex;align-items:center;justify-content:center;
  padding:0 20px;
}
#text-box-inner{
  background:#e60a14;
  border-radius:10px;
  padding:14px 20px;
  width:100%;text-align:center;
}
#text-box-inner p{
  color:white;font-size:14px;
  font-weight:600;line-height:1.4;
}

/* Overlay */
#overlay{
  position:absolute;inset:0;z-index:10;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.72);
}
#overlay.show{display:flex;}
#overlay-box{
  background:#e60a14;border-radius:16px;
  padding:32px 28px;text-align:center;max-width:320px;
}
#overlay-box h2{color:white;font-size:28px;font-weight:700;margin-bottom:8px;}
#overlay-box p{color:rgba(255,255,255,0.9);font-size:15px;margin-bottom:20px;}
#overlay-box button{
  background:white;color:#e60a14;border:none;
  border-radius:30px;padding:12px 36px;
  font-size:16px;font-weight:700;cursor:pointer;
}
#overlay-box button:hover{background:#f0f0f0;}

@keyframes pop{
  0%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.3);opacity:0.5;}
  100%{transform:scale(0);opacity:0;}
}
</style>
</head>

const GRID_SIZE=5;
let board=[],selected=null,score=0,timeLeft=30,timer=null,busy=false;

function randTile(){return Math.floor(Math.random()*4);}

function initBoard(){
  board=[];
  for(let r=0;r<GRID_SIZE;r++){
    board.push([]);
    for(let c=0;c<GRID_SIZE;c++){
      let t;
      do{t=randTile();}while(wouldMatch(board,r,c,t));
      board[r].push(t);
    }
  }
}

function wouldMatch(b,r,c,t){
  if(c>=2&&b[r][c-1]===t&&b[r][c-2]===t)return true;
  if(r>=2&&b[r-1]&&b[r-1][c]===t&&b[r-2]&&b[r-2][c]===t)return true;
  return false;
}

function renderBoard(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.r=r;cell.dataset.c=c;
      const img=document.createElement('img');
      img.src=TILES[board[r][c]];
      cell.appendChild(img);
      cell.addEventListener('click',()=>onCellClick(r,c));
      grid.appendChild(cell);
    }
  }
}

function getCellEl(r,c){
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function onCellClick(r,c){
  if(busy)return;
  if(selected===null){
    selected={r,c};
    getCellEl(r,c).classList.add('selected');
  }else{
    const prev=selected;
    getCellEl(prev.r,prev.c).classList.remove('selected');
    selected=null;
    if(isAdjacent(prev,{r,c})){
      trySwap(prev.r,prev.c,r,c);
    }
  }
}

function isAdjacent(a,b){
  return(Math.abs(a.r-b.r)+Math.abs(a.c-b.c))===1;
}

async function trySwap(r1,c1,r2,c2){
  busy=true;
  swap(r1,c1,r2,c2);
  const matches=findMatches();
  if(matches.length===0){
    swap(r1,c1,r2,c2);
    renderBoard();
    busy=false;
    return;
  }
  await resolveMatches();
  busy=false;
}

function swap(r1,c1,r2,c2){
  const tmp=board[r1][c1];
  board[r1][c1]=board[r2][c2];
  board[r2][c2]=tmp;
}

function findMatches(){
  const matched=new Set();
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE-2;c++){
      if(board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]){
        matched.add(`${r},${c}`);
        matched.add(`${r},${c+1}`);
        matched.add(`${r},${c+2}`);
      }
    }
  }
  for(let c=0;c<GRID_SIZE;c++){
    for(let r=0;r<GRID_SIZE-2;r++){
      if(board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]){
        matched.add(`${r},${c}`);
        matched.add(`${r+1},${c}`);
        matched.add(`${r+2},${c}`);
      }
    }
  }
  return[...matched].map(k=>k.split(',').map(Number));
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function resolveMatches(){
  let matches=findMatches();
  while(matches.length>0){
    score+=matches.length*10;
    document.getElementById('score').textContent=score;
    matches.forEach(([r,c])=>{
      board[r][c]=-1;
      const el=getCellEl(r,c);
      if(el)el.classList.add('matched');
    });
    await sleep(380);
    dropTiles();
    renderBoard();
    await sleep(260);
    matches=findMatches();
  }
}

function dropTiles(){
  for(let c=0;c<GRID_SIZE;c++){
    let empty=GRID_SIZE-1;
    for(let r=GRID_SIZE-1;r>=0;r--){
      if(board[r][c]!==-1){
        board[empty][c]=board[r][c];
        if(empty!==r)board[r][c]=-1;
        empty--;
      }
    }
    for(let r=empty;r>=0;r--){board[r][c]=randTile();}
  }
}

function startTimer(){
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0){clearInterval(timer);endGame();}
  },1000);
}

function endGame(){
  busy=true;
  document.getElementById('final-score').textContent=score;
  document.getElementById('overlay-title').textContent=score>=100?'Great job!':'Time\'s Up!';
  document.getElementById('overlay-msg').innerHTML=`You scored <strong>${score}</strong> points!`;
  document.getElementById('overlay').classList.add('show');
}

function restartGame(){
  clearInterval(timer);
  score=0;timeLeft=30;busy=false;selected=null;
  document.getElementById('score').textContent='0';
  document.getElementById('timer').textContent='30';
  document.getElementById('overlay').classList.remove('show');
  initBoard();renderBoard();startTimer();
}

initBoard();renderBoard();startTimer();
</script>
</body>
</html>
